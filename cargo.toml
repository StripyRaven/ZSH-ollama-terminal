[workspace]
members = [
    "crates/shared",
    "crates/config",
    "crates/security",
    "crates/ollama-client",
    "crates/ai-core",
    "crates/training-engine",
    "crates/file-ops",
    "crates/platform",
    "crates/terminal-integration",
    "crates/web-ui",
    "apps/cli",
    "apps/daemon",
    "crates/check-milestones"
]

resolver = "2"

[workspace.package]
version = "0.1.0"
authors = ["ZSH Ollama Terminal"]
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# internal
check-milestones = { path = "crates/check-milestones" }
# external
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
thiserror = "2"
tracing = "0.1"

# Фаза 1: Core Types Dependencies
libc = "0.2"
uuid = { version = "1.3", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
whoami = "1.0"


# Фаза 2: Infrastructure Dependencies
reqwest = "0.12"
regex = "1.0"

# Фаза 2: Infrastructure Dependencies (будет добавлено позже)
# axum = "0.7"
# tera = "1.0"
# reqwest = "0.11"

# Фаза 3: AI Core Dependencies (будет добавлено позже)
